<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
<head>
	<title>Happy Birthday 🎂</title>
	<meta http-equiv="content-type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta name="description" content="A special birthday message just for you 🎂">
	<style type="text/css">
		@font-face {
			font-family: digit;
			src: url('digital-7_mono.ttf') format("truetype");
		}
	</style>
	<link href="css/default.css" type="text/css" rel="stylesheet">
	<script type="text/javascript" src="js/garden.js"></script>
    <script type="text/javascript" src="js/birthday-app.js"></script>
</head>

<body>
	<div id="mainDiv">
		<div id="content">
			<div id="loveHeart">
				<canvas id="garden"></canvas>

				<!-- UPPER empty zone: countdown -->
				<div id="messages">
					Your birthday star after:
					<div id="elapseClock"></div>
				</div>

				<!-- LOWER empty zone: personal message -->
				<div id="loveu">
					"I wish you, happiness, strength and everything you wish can be achieved"<br>
					Last thing I want say, boring and ordinary is : <br>
					<div class="signature">Happy Birthday Malooka!</div>
				</div>
			</div>
		</div>
		<div id="copyright">
			Celebrate Your day wish you all Happines!
		</div>
	</div>
	<script type="text/javascript">
		if (!document.createElement('canvas').getContext) {
			const msg = document.createElement("div");
			msg.id = "errorMsg";
			msg.innerHTML = "Your browser doesn't support HTML5!<br/>Please use a modern browser like Chrome or Safari.";
			document.body.appendChild(msg);
		} else {
			document.addEventListener('DOMContentLoaded', function() {
				// Just start the heart animation — the countdown
				// is triggered automatically when the heart finishes
				setTimeout(() => {
					if (window.birthdayApp) {
						window.birthdayApp.startHeartAnimation();
					}
				}, 300);
			});
		}
	</script>
</body>
</html>
